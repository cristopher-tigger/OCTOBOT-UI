<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Octobot · Audio to Video</title>
  <meta name="description" content="Convierte tu audio narrado en video con stock footage automáticamente." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="./styles.css" />

  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='13' r='7' fill='none' stroke='%23fafafa' stroke-width='2'/%3E%3Cpath d='M9 17 Q5 22 5 27' fill='none' stroke='%23fafafa' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M16 20 Q16 26 16 29' fill='none' stroke='%23fafafa' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M23 17 Q27 22 27 27' fill='none' stroke='%23fafafa' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E"
    type="image/svg+xml" />
</head>

<body>
  <canvas id="bg-canvas"></canvas>

  <aside class="sidebar">
    <div class="sidebar-brand" onclick="goHome()">
      <span class="brand-logo">
        <svg viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="13" r="7" stroke="currentColor" stroke-width="2.5" />
          <path d="M9 17 Q5 22 5 27" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
          <path d="M16 20 Q16 26 16 29" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
          <path d="M23 17 Q27 22 27 27" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        </svg>
      </span>
      <span class="brand-name">Octobot</span>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-btn active" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M4 6h16M4 12h16M4 18h16" />
        </svg>
        <span>Mi Galería</span>
      </button>
      <button class="nav-btn" onclick="renderUpload()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 5v14M5 12h14" />
        </svg>
        <span>Nuevo Video</span>
      </button>
      <button class="nav-btn" onclick="alert('Próximamente: Analytics')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M18 20V10M12 20V4M6 20v-6" />
        </svg>
        <span>Analytics</span>
      </button>
      <button class="nav-btn" onclick="alert('Próximamente: Calendario')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        <span>Calendario</span>
      </button>
    </nav>
  </aside>

  <div class="shell">
    <header class="topbar">
      <div id="topbar-context" class="topbar-context">
        <h2 id="view-title" class="view-title">Mis videos</h2>
      </div>
      <div id="topbar-actions"></div>
    </header>

    <main id="main"></main>
  </div>

  <div id="modal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./background.js"></script>
  <script src="./app.js"></script>
</body>

</html>
