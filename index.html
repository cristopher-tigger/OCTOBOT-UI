<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Octobot · Audio to Video</title>
  <meta name="description" content="Convierte tu audio narrado en video con stock footage automáticamente." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="./styles.css" />

  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='13' r='7' fill='none' stroke='%23fafafa' stroke-width='2'/%3E%3Cpath d='M9 17 Q5 22 5 27' fill='none' stroke='%23fafafa' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M16 20 Q16 26 16 29' fill='none' stroke='%23fafafa' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M23 17 Q27 22 27 27' fill='none' stroke='%23fafafa' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E"
    type="image/svg+xml" />
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-logo">
          <svg viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="13" r="7" stroke="currentColor" stroke-width="2" />
            <path d="M9 17 Q5 22 5 27" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M12 19 Q10 25 8 28" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M16 20 Q16 26 16 29" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M20 19 Q22 25 24 28" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M23 17 Q27 22 27 27" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <circle cx="13" cy="12" r="1.2" fill="currentColor" />
            <circle cx="19" cy="12" r="1.2" fill="currentColor" />
          </svg>
        </span>
        <span class="brand-name">Octobot</span>
        <span class="brand-version">v0.1 · BETA</span>
      </div>
      <span class="status-pill" id="status-pill">Conectado</span>
    </header>

    <main id="main"></main>

    <footer class="footer">
      <div class="footer-line"></div>
      <div class="footer-row">
        <span>Alma Quinta · Octobot 2026</span>
        <div class="footer-pills">
          <span class="footer-pill">AssemblyAI</span>
          <span class="footer-pill">Claude</span>
          <span class="footer-pill">Pexels</span>
          <span class="footer-pill">Shotstack</span>
        </div>
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js"></script>
</body>

</html>
